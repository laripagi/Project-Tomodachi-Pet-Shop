name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Flutter Analyze
        run: flutter analyze --no-pub
        working-directory: frontend

      - name: Run tests
        run: flutter test
        working-directory: frontend
        continue-on-error: true

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build APK
        run: flutter build apk --no-tree-shake-icons
        working-directory: frontend
        continue-on-error: true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: flutter-apk
          path: frontend/build/app/outputs/flutter-app.apk
          retention-days: 5

  build-web:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build Web
        run: flutter build web
        working-directory: frontend
        continue-on-error: true

      - name: Upload Web Build
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: flutter-web-build
          path: frontend/build/web
          retention-days: 5
